version: "2"
type: backend
tech_stack:
  - TypeScript
  - Next.js 16 (App Router)
  - PostgreSQL (pg)
  - Redis (ioredis)
  - BullMQ (background workers)
  - JWT (jsonwebtoken)
  - bcryptjs (password hashing)
  - QRCode (qrcode)
  - ImageKit (image hosting)
  - nanoid (short code generation)
  - ua-parser-js (user-agent parsing)
features:
  - name: URL Management API
    description: CRUD operations for short URL resources with auth, validation, and cache invalidation
    files:
      - backend/src/routes/url.routes.ts
      - backend/src/services/url.service.ts
      - backend/src/models/url.model.ts
      - backend/src/validators/url.validator.ts
    endpoints:
      - method: POST
        path: /api/urls
        description: Create a new short link with optional custom alias and expiry date
        auth_required: true
        request_schema:
          body:
            long_url: string
            custom_alias: string (optional)
            expiry_date: string (optional, ISO date)
        response_schema:
          "201": "{ short_url: string, expires_at: string | null }"
          "400": Validation error
          "401": Unauthorized
          "500": Internal server error
      - method: GET
        path: /api/urls
        description: Return all links for authenticated user with pagination
        auth_required: true
        request_schema:
          query:
            page: number (optional, default 1)
            limit: number (optional, default 10)
        response_schema:
          "200": "Array<{ id, short_code, long_url, click_count }>"
          "401": Unauthorized
      - method: GET
        path: /api/urls/:id
        description: Fetch single link details by ID
        auth_required: true
        response_schema:
          "200": "{ short_code, long_url, status, expiry_date }"
          "404": URL not found
          "401": Unauthorized
      - method: PATCH
        path: /api/urls/:id
        description: Update link expiry settings
        auth_required: true
        request_schema:
          body:
            expiry_date: string (ISO date)
        response_schema:
          "200": "{ message: 'URL updated successfully' }"
          "400": Validation error
          "401": Unauthorized
      - method: DELETE
        path: /api/urls/:id
        description: Soft delete a link and invalidate cache
        auth_required: true
        response_schema:
          "200": "{ message: 'URL deleted' }"
          "404": URL not found
          "401": Unauthorized
    depends_on:
      - Authentication
      - Redis Cache
      - Rate Limiting
      - Malware Scanning Pipeline

  - name: URL Redirection
    description: Public redirect endpoint with caching, rate limiting, and async analytics offloading
    files:
      - backend/src/routes/url.routes.ts
      - backend/src/services/redirect.service.ts
      - backend/src/services/rateLimit.service.ts
      - backend/src/services/queue.service.ts
    endpoints:
      - method: GET
        path: /:short_code
        description: Redirect to original URL with rate limiting and analytics tracking
        auth_required: false
        response_schema:
          "302": Redirect to long_url
          "404": URL not found or inactive
          "410": URL has expired
          "429": Rate limit exceeded
    depends_on:
      - Redis Cache
      - Rate Limiting
      - Analytics Queue

  - name: Analytics API
    description: Click analytics with total counts, daily breakdowns, country, and device distributions
    files:
      - backend/src/routes/analytics.routes.ts
      - backend/src/services/analytics.service.ts
    endpoints:
      - method: GET
        path: /api/urls/:id/analytics
        description: Get total click count for a URL
        auth_required: true
        response_schema:
          "200": "{ total_clicks: number }"
          "401": Unauthorized
      - method: GET
        path: /api/urls/:id/analytics/daily
        description: Get daily click statistics with date range filtering
        auth_required: true
        request_schema:
          query:
            startDate: string (optional, ISO date)
            endDate: string (optional, ISO date)
        response_schema:
          "200": "Array<{ date, clicks }>"
          "400": Invalid date format or startDate > endDate
          "401": Unauthorized
      - method: GET
        path: /api/urls/:id/analytics/countries
        description: Click distribution by country
        auth_required: true
        response_schema:
          "200": "Array<{ country, clicks }>"
          "401": Unauthorized
      - method: GET
        path: /api/urls/:id/analytics/devices
        description: Click distribution by device type
        auth_required: true
        response_schema:
          "200": "Array<{ device, clicks }>"
          "401": Unauthorized
    depends_on:
      - Authentication

  - name: Lifecycle Management API
    description: URL status management including disable, enable, and expiry extension
    files:
      - backend/src/routes/lifecycle.routes.ts
      - backend/src/services/url.service.ts
    endpoints:
      - method: GET
        path: /api/urls/:id/status
        description: Check current link state and expiration
        auth_required: true
        response_schema:
          "200": "{ status: string, expires_at: string | null }"
          "404": URL not found
          "401": Unauthorized
      - method: PATCH
        path: /api/urls/:id/disable
        description: Temporarily disable a link and clear cache
        auth_required: true
        response_schema:
          "200": "{ message: 'URL disabled' }"
          "404": URL not found
          "401": Unauthorized
      - method: PATCH
        path: /api/urls/:id/enable
        description: Re-enable a previously disabled link
        auth_required: true
        response_schema:
          "200": "{ message: 'URL enabled' }"
          "404": URL not found
          "401": Unauthorized
      - method: PATCH
        path: /api/urls/:id/extend
        description: Extend URL expiration time with cache invalidation
        auth_required: true
        request_schema:
          body:
            expiry_date: string (ISO date)
        response_schema:
          "200": "{ message: 'URL expiration extended' }"
          "400": Validation error
          "401": Unauthorized
    depends_on:
      - Authentication
      - Redis Cache

  - name: QR Code API
    description: QR code retrieval for short links (generated asynchronously by background worker)
    files:
      - backend/src/routes/qrcode.routes.ts
      - backend/src/models/qr.model.ts
      - backend/src/services/qr.service.ts
    endpoints:
      - method: GET
        path: /api/urls/:id/qrcode
        description: Return QR code image URL for a short link
        auth_required: true
        response_schema:
          "200": "{ qr_code: string }"
          "404": QR code not found (may still be generating)
          "401": Unauthorized
    depends_on:
      - Authentication
      - QR Background Worker

  - name: System Monitoring API
    description: Health checks, system metrics, and rate limit quota endpoints
    files:
      - backend/src/routes/system.routes.ts
      - backend/src/services/metrics.service.ts
      - backend/src/services/rateLimit.service.ts
    endpoints:
      - method: GET
        path: /api/health
        description: Check system health (database, Redis, workers)
        auth_required: false
        response_schema:
          "200": "{ database: string, redis: string, workers: string }"
          "503": Unhealthy status with error details
      - method: GET
        path: /api/metrics
        description: Expose system metrics (total URLs, clicks, Redis memory)
        auth_required: false
        response_schema:
          "200": "{ total_urls: number, total_clicks: number, redis_memory: string }"
      - method: GET
        path: /api/rate-limit
        description: Show remaining rate limit quota for user
        auth_required: true
        response_schema:
          "200": "{ creations_remaining: number, redirects_remaining: number }"
          "401": Unauthorized
    depends_on:
      - Authentication (rate-limit only)
      - Redis
      - PostgreSQL

  - name: Internal Worker API
    description: Internal endpoints for triggering background jobs (dead link scan, click sync, malware scan, queue status)
    files:
      - backend/src/routes/internal.routes.ts
      - backend/src/services/queue.service.ts
      - backend/src/services/worker.service.ts
    endpoints:
      - method: POST
        path: /api/internal/workers/deadlink-scan
        description: Trigger dead link detection scan
        auth_required: true
        request_schema:
          headers:
            x-internal-secret: string
        response_schema:
          "200": "{ message: 'Dead link scan job enqueued' }"
          "401": Unauthorized (invalid internal secret)
      - method: POST
        path: /api/internal/workers/sync-clicks
        description: Flush Redis click counters to database
        auth_required: true
        request_schema:
          headers:
            x-internal-secret: string
        response_schema:
          "200": "{ message: 'Click sync job enqueued' }"
          "401": Unauthorized
      - method: POST
        path: /api/internal/workers/scan-malware
        description: Scan a URL for malicious content
        auth_required: true
        request_schema:
          headers:
            x-internal-secret: string
          body:
            url_id: number
            long_url: string
        response_schema:
          "200": "{ message: 'Malware scan job enqueued' }"
          "400": Validation error
          "401": Unauthorized
      - method: GET
        path: /api/internal/queues
        description: Check all job queue status and active worker counts
        auth_required: true
        request_schema:
          headers:
            x-internal-secret: string
        response_schema:
          "200": "{ queues: { scan, creation, qr, analytics, maintenance, logging }, active_workers: number, worker_detail: object }"
          "401": Unauthorized
    depends_on:
      - BullMQ Queues
      - Internal Secret Auth

  - name: Authentication
    description: JWT-based authentication middleware with session management
    files:
      - backend/src/middleware/auth.middleware.ts
      - backend/src/utils/auth.ts
      - backend/src/services/auth.service.ts
    endpoints: []
    depends_on: []

  - name: Redis Cache Layer
    description: Redis caching for URL lookups, click counters, and rate limiting
    files:
      - backend/src/utils/redis.ts
      - backend/src/services/cache.service.ts
    endpoints: []
    depends_on: []

  - name: Background Workers
    description: BullMQ-based worker system with 6 queues for scan, creation, QR, analytics, maintenance, and logging
    files:
      - backend/src/queues/scan.queue.ts
      - backend/src/services/queue.service.ts
      - backend/src/services/worker.service.ts
      - backend/src/workers/
    endpoints: []
    depends_on:
      - Redis
      - PostgreSQL

known_limitations:
  - issue: Health check returns static 'running' for workers instead of dynamic check
    location: backend/src/routes/system.routes.ts
    impact: False positive worker health reporting
  - issue: Auth type says NONE in testsprite_config.json despite JWT auth being implemented
    location: testsprite_config.json
    impact: Test configuration may not reflect actual auth requirements
  - issue: Internal API uses x-internal-secret header OR NODE_ENV=development bypass
    location: backend/src/routes/internal.routes.ts
    impact: Internal endpoints accessible without auth in development mode